<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>일정 맞추기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem}
.container{width:100%;max-width:520px}
.card{background:#fff;border-radius:16px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:1rem}
h1{font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
h2{font-size:17px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:1.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:#666;margin-bottom:5px;font-weight:500}

/* 텍스트 입력창 스타일 */
input[type=text]{width:100%;height:40px;padding:0 12px;border-radius:10px;border:1px solid #e0e0e0;font-size:14px;color:#1a1a1a;background:#fafafa;outline:none;transition:border .15s}
input[type=text]:focus{border-color:#378ADD;background:#fff}

/* 날짜 입력창 스타일 (date picker) */
input[type=date]{height:40px;padding:0 10px;border-radius:10px;border:1px solid #e0e0e0;font-size:14px;color:#1a1a1a;background:#fafafa;outline:none;transition:border .15s;font-family:inherit}
input[type=date]:focus{border-color:#378ADD;background:#fff}

.btn{height:40px;padding:0 18px;border-radius:10px;border:1px solid #e0e0e0;background:#fff;color:#1a1a1a;cursor:pointer;font-size:14px;font-family:inherit;transition:background .12s}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#378ADD;color:#fff;border-color:transparent;font-weight:600}
.btn-primary:hover{background:#2a72c3}

/* 링크 복사 버튼 (캘린더 상단용) */
.btn-share{height:32px;padding:0 12px;border-radius:8px;border:1px solid #378ADD;background:#EFF6FF;color:#378ADD;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:background .12s;white-space:nowrap}
.btn-share:hover{background:#dbeeff}

/* 방 삭제 버튼 */
.btn-delete{height:32px;padding:0 12px;border-radius:8px;border:1px solid #E24B4A;background:#fff0f0;color:#E24B4A;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:background .12s;white-space:nowrap}
.btn-delete:hover{background:#ffd9d9}

.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border .12s}
.cdot.sel{border-color:#1a1a1a;transform:scale(1.18)}
.cdot.taken{opacity:.22;cursor:not-allowed}
.participants{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem}
.tag{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:13px;font-weight:600;border:2px solid transparent}
.tag-remove{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.15);color:inherit;cursor:pointer;font-size:11px;line-height:1;border:none;padding:0;margin-left:2px;transition:background .12s}
.tag-remove:hover{background:rgba(0,0,0,.3)}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:.6rem}
.month-title{font-size:15px;font-weight:600;color:#1a1a1a;min-width:90px}
.nav-btn{width:28px;height:28px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#f0f0f0}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.cal-head span{text-align:center;font-size:12px;color:#aaa;padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}

/* 날짜 셀 스타일 */
.dc{min-height:64px;border-radius:10px;border:1px solid #f0f0f0;padding:5px;cursor:pointer;background:#fff;position:relative;user-select:none;transition:border .1s,background .15s}
.dc:hover:not(.other){border-color:#ccc}
.dc.other{opacity:.2;pointer-events:none}
.dc.today .dn{background:#E24B4A;color:#fff;border-radius:50%}

/* 히트맵: 모두 가능 (초록) */
.dc.heat-all{background:#e6f5ef !important}
/* 히트맵: 절반 이상 가능 (노랑) */
.dc.heat-half{background:#fff8e6 !important}
/* 히트맵: 일부만 가능 (연한 빨강) */
.dc.heat-few{background:#fff0f0 !important}

.dn{font-size:12px;font-weight:600;color:#1a1a1a;width:21px;height:21px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.dots{display:flex;flex-wrap:wrap;gap:2px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* 히트맵 바: 두껍게 개선 */
.hbar{height:6px;border-radius:3px;margin-top:5px}

.fixed-ev{font-size:10px;padding:1px 4px;border-radius:3px;background:#FFEAEA;color:#c0392b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.info-bar{font-size:13px;color:#888;margin-bottom:.6rem;min-height:18px}
.info-bar.good{color:#0F6E56;font-weight:600}
.share-section{background:#f0f7ff;border-radius:12px;padding:1rem;margin-top:1.25rem}
.share-section .stitle{font-size:13px;color:#555;margin-bottom:8px;font-weight:500}
.url-row{display:flex;gap:8px;align-items:center}
.url-row input{flex:1;font-size:12px;color:#555;background:#fff;height:36px}
.legend{margin-top:1rem;padding-top:1rem;border-top:1px solid #f0f0f0}
.ltitle{font-size:13px;color:#888;margin-bottom:6px;font-weight:500}
.li-row{font-size:13px;color:#1a1a1a;margin-bottom:4px}
.li-names{font-weight:600}
.copied-msg{font-size:12px;color:#1D9E75;margin-left:4px;opacity:0;transition:opacity .3s}
.copied-msg.show{opacity:1}
.screen{display:none}.screen.active{display:block}
.hint{font-size:12px;color:#999;margin-bottom:1rem;line-height:1.5}
.divider{border:none;border-top:1px solid #f0f0f0;margin:1.25rem 0}
.my-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:13px;font-weight:600;border:2px solid transparent;margin-left:8px;vertical-align:middle}
.loading{text-align:center;padding:2rem;color:#aaa;font-size:14px}
.room-code{font-family:monospace;font-size:18px;font-weight:700;letter-spacing:3px;color:#378ADD;background:#EFF6FF;padding:8px 16px;border-radius:8px;display:inline-block;margin:8px 0}
.online-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* 홈 화면 3단계 사용법 안내 */
.steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.step-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:80px}
.step-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:#EFF6FF}
.step-label{font-size:11px;color:#666;text-align:center;line-height:1.4}
.step-arrow{color:#ccc;font-size:18px;flex-shrink:0}
</style>
</head>
<body>
<div class="container">

<!-- ===== 홈 화면 ===== -->
<div class="screen active card" id="s-home">
  <h1>📅 일정 맞추기</h1>
  <p class="sub">방을 만들고 링크를 공유하세요 — 실시간으로 동기화돼요</p>

  <!-- 3단계 사용법 안내 -->
  <div class="steps">
    <div class="step-item">
      <div class="step-icon">🏠</div>
      <div class="step-label">① 방 만들기</div>
    </div>
    <div class="step-arrow">›</div>
    <div class="step-item">
      <div class="step-icon">📆</div>
      <div class="step-label">② 날짜 선택</div>
    </div>
    <div class="step-arrow">›</div>
    <div class="step-item">
      <div class="step-icon">🔗</div>
      <div class="step-label">③ 친구에게 공유</div>
    </div>
  </div>

  <div class="field">
    <label>방 제목</label>
    <input type="text" id="roomTitle" placeholder="예: 4월 모임 날짜 정하기"/>
  </div>
  <div class="field">
    <label>날짜 범위</label>
    <div style="display:flex;gap:8px;align-items:center">
      <!-- type="date" 로 변경 → 달력 팝업으로 선택 가능 -->
      <input type="date" id="rangeStart"/>
      <span style="color:#aaa;font-size:13px">~</span>
      <input type="date" id="rangeEnd"/>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="createRoom()">방 만들기</button>
  </div>
  <hr class="divider"/>
  <p style="font-size:13px;color:#aaa;margin-bottom:.6rem">공유받은 링크로 입장</p>
  <div style="display:flex;gap:8px">
    <input type="text" id="joinCode" placeholder="링크 또는 방 코드 입력"/>
    <button class="btn btn-primary" onclick="joinRoom()">일정 보기</button>
  </div>
  <div id="homeError" style="font-size:12px;color:#E24B4A;margin-top:8px"></div>
</div>

<!-- ===== 이름/색상 입력 화면 ===== -->
<div class="screen card" id="s-name">
  <h2 id="roomTitleDisp"></h2>
  <p class="sub" id="roomSubDisp"></p>
  <div class="field">
    <label>이름</label>
    <input type="text" id="myName" placeholder="홍길동"/>
  </div>
  <div class="field">
    <label>색상</label>
    <div class="color-row" id="colorPick2"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="enterRoom()">참여하기</button>
    <button class="btn" onclick="goHome()">뒤로</button>
  </div>
  <div id="nameError" style="font-size:12px;color:#E24B4A;margin-top:8px"></div>
</div>

<!-- ===== 캘린더 화면 ===== -->
<div class="screen card" id="s-cal">

  <!-- 제목 + 내 이름 배지 + 링크 복사 버튼 (상단에 배치) -->
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:4px">
    <!-- 제목 영역: 일반 모드 / 편집 모드 전환 -->
    <div id="titleView" style="display:flex;align-items:center;gap:6px">
      <h2 id="calTitle" style="margin-bottom:0"></h2>
      <button onclick="window.startEditTitle()" style="background:none;border:none;cursor:pointer;font-size:14px;color:#aaa;padding:2px 4px;border-radius:4px;line-height:1" title="제목 수정">✏️</button>
    </div>
    <div id="titleEdit" style="display:none;align-items:center;gap:6px">
      <input type="text" id="titleInput" style="height:32px;padding:0 10px;border-radius:8px;border:1px solid #378ADD;font-size:15px;font-weight:600;color:#1a1a1a;width:200px;outline:none"/>
      <button onclick="window.saveTitle()" style="height:32px;padding:0 12px;border-radius:8px;background:#378ADD;color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600">저장</button>
      <button onclick="window.cancelEditTitle()" style="height:32px;padding:0 10px;border-radius:8px;background:#f0f0f0;color:#666;border:none;cursor:pointer;font-size:13px">취소</button>
    </div>
    <span class="my-badge" id="myBadge"></span>
    <span style="margin-left:auto;font-size:12px;color:#888;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span><span class="online-dot"></span>실시간 동기화</span>
      <button class="btn-share" onclick="copyUrl()">🔗 링크 복사</button>
      <!-- 방장만 보이는 삭제 버튼 -->
      <button class="btn-delete" id="deleteRoomBtn" style="display:none" onclick="window.deleteRoom()">🗑 방 삭제</button>
    </span>
  </div>
  <div id="copiedMsgTop" style="font-size:12px;color:#1D9E75;margin-bottom:.5rem;min-height:16px;opacity:0;transition:opacity .3s">✓ 복사됐어요!</div>

  <div class="hint" id="calHint"></div>

  <!-- 새 참여자 추가 버튼 -->
  <div id="joinBtnWrap" style="display:none;margin-bottom:.75rem">
    <button class="btn btn-primary" onclick="window.openJoinPanel()" style="width:100%">+ 내 일정 추가하기</button>
  </div>

  <!-- 참여자 패널 -->
  <div id="joinPanel" style="display:none;background:#f8f8f8;border-radius:12px;padding:1rem;margin-bottom:.75rem">
    <div style="font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:.75rem">참여하기</div>
    <div class="field" style="margin-bottom:.75rem">
      <label>이름</label>
      <input type="text" id="joinName" placeholder="홍길동"/>
    </div>
    <div class="field" style="margin-bottom:.75rem">
      <label>색상</label>
      <div class="color-row" id="joinColorPick"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="window.closeJoinPanel()" style="flex:1">취소</button>
      <button class="btn btn-primary" onclick="window.submitJoin()" style="flex:1">참여하기</button>
    </div>
    <div id="joinPanelError" style="font-size:12px;color:#E24B4A;margin-top:6px"></div>
  </div>

  <!-- 참여자 태그 목록 -->
  <div class="participants" id="participantTags"></div>

  <!-- 겹치는 날짜 요약 바 -->
  <div class="info-bar" id="infoBar"></div>

  <!-- 월 이동 버튼 -->
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-title" id="monthTitle"></span>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- 요일 헤더 -->
  <div class="cal-head">
    <span style="color:#E24B4A">일</span>
    <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span>
    <span style="color:#378ADD">토</span>
  </div>

  <!-- 달력 그리드 -->
  <div class="cal-grid" id="calGrid"></div>

  <!-- 겹치는 날짜 목록 -->
  <div class="legend" id="legend" style="display:none">
    <div class="ltitle">겹치는 날짜</div>
    <div id="legendItems"></div>
  </div>

  <!-- 공유 섹션 (하단) -->
  <div class="share-section">
    <div class="stitle">📎 이 링크를 복사해서 친구에게 공유하세요</div>
    <div style="margin-bottom:8px;display:flex;align-items:center;gap:10px">
      <span style="font-size:12px;color:#888">방 코드</span>
      <span id="roomCodeDisp" style="font-family:monospace;font-size:16px;font-weight:700;letter-spacing:3px;color:#378ADD;background:#EFF6FF;padding:4px 12px;border-radius:8px"></span>
    </div>
    <div class="url-row">
      <input type="text" id="shareUrl" readonly/>
      <button class="btn btn-primary" onclick="copyUrl()">복사</button>
    </div>
    <div style="margin-top:6px"><span class="copied-msg" id="copiedMsg">✓ 복사됐어요!</span></div>
  </div>

  <!-- 새 방 만들기 버튼 (모든 사용자에게 표시) -->
  <div style="margin-top:1rem;text-align:center">
    <button class="btn" onclick="window.goNewRoom()" style="font-size:13px;color:#888">+ 새 방 만들기</button>
  </div>

</div><!-- end s-cal -->

</div><!-- end container -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, set, get, update, remove, onValue } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

// Firebase 연결 설정
const firebaseConfig = {
  apiKey: "AIzaSyBRgreldOpFko4xJIp8xMqv3LqogjgsWZQ",
  authDomain: "sharing-schedule-62c22.firebaseapp.com",
  databaseURL: "https://sharing-schedule-62c22-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sharing-schedule-62c22",
  storageBucket: "sharing-schedule-62c22.firebasestorage.app",
  messagingSenderId: "267014545843",
  appId: "1:267014545843:web:df8371cbc5ffbe99be2bc6"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 참여자 색상 팔레트
const COLORS = [
  {bg:'#E24B4A', light:'#FFEAEA', text:'#a32d2d'},
  {bg:'#378ADD', light:'#E6F1FB', text:'#185FA5'},
  {bg:'#1D9E75', light:'#E1F5EE', text:'#0F6E56'},
  {bg:'#EF9F27', light:'#FFF3DC', text:'#854F0B'},
  {bg:'#7F77DD', light:'#EEEDFE', text:'#534AB7'},
  {bg:'#D4537E', light:'#FBEAF0', text:'#993556'},
];

// 현재 상태 변수
let roomId = null, me = null, roomData = null, currentMonth = null;
let isDragging = false, dragMode = null;
let unsubscribe = null;

// ─── 날짜 키 생성 헬퍼 ───
function dkey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// ─── 랜덤 방 ID 생성 ───
function randId() {
  return Math.random().toString(36).slice(2,8).toUpperCase();
}

// ─── 화면 전환 ───
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── 홈 화면 초기화: 날짜 기본값을 오늘 기준으로 설정 ───
function initHomeDates() {
  // toISOString()은 UTC 기준이라 한국(UTC+9)에서 오전 9시 이전에 전날 날짜가 나오는 버그가 있음
  // → 로컬 시간 기준으로 직접 계산
  const fmt = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };
  const today = new Date();
  document.getElementById('rangeStart').value = fmt(today);
  // 종료일: 오늘로부터 30일 후
  const end = new Date(today.getFullYear(), today.getMonth(), today.getDate() + 30);
  document.getElementById('rangeEnd').value = fmt(end);
}
initHomeDates();

// ─── 홈으로 돌아가기 (상태 완전 초기화) ───
window.goHome = function() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  roomId = null; me = null; roomData = null; currentMonth = null;
  show('s-home');
};

// ─── 새 방 만들기 (캘린더 화면 → 홈으로 이동 후 날짜 초기화) ───
window.goNewRoom = function() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  roomId = null; me = null; roomData = null; currentMonth = null;
  initHomeDates(); // 날짜 기본값 오늘 기준으로 재설정
  document.getElementById('roomTitle').value = '';
  document.getElementById('homeError').textContent = '';
  show('s-home');
};

// ─── 방 만들기 ───
window.createRoom = async function() {
  const title = document.getElementById('roomTitle').value.trim() || '일정 조율';
  const start = document.getElementById('rangeStart').value;
  const end   = document.getElementById('rangeEnd').value;
  const errEl = document.getElementById('homeError');

  // 날짜 유효성 검사
  if (!start || !end) {
    errEl.textContent = '날짜 범위를 선택하세요';
    return;
  }
  if (start > end) {
    errEl.textContent = '종료일이 시작일보다 빠를 수 없어요';
    return;
  }
  errEl.textContent = '';

  // 버튼 비활성화 (중복 클릭 방지)
  const btn = document.querySelector('#s-home .btn-primary');
  btn.textContent = '만드는 중...';
  btn.disabled = true;

  try {
    roomId = randId();
    const data = {title, start, end, participants: {}};
    await set(ref(db, `rooms/${roomId}`), data);
    roomData = data;
    // 방장 여부를 localStorage에 저장 (이 브라우저에서 만든 방임을 기억)
    localStorage.setItem('room_owner_' + roomId, '1');
    document.getElementById('roomTitleDisp').textContent = title;
    document.getElementById('roomSubDisp').textContent = `${start} ~ ${end}`;
    renderColorPick2([]);
    show('s-name');
  } catch(e) {
    // 에러 종류에 따라 다른 메시지 표시
    const msg = e?.message || String(e);
    if (msg.includes('PERMISSION_DENIED')) {
      errEl.textContent = 'Firebase 보안 규칙이 쓰기를 막고 있어요. (PERMISSION_DENIED)';
    } else {
      errEl.textContent = `오류: ${msg}`;
    }
    console.error('createRoom 에러:', e);
  } finally {
    btn.textContent = '방 만들기';
    btn.disabled = false;
  }
};

// ─── 공유 링크로 방 입장 ───
window.joinRoom = async function() {
  const raw = document.getElementById('joinCode').value.trim();
  let code = '';
  try { const u = new URL(raw); code = u.searchParams.get('room') || ''; }
  catch(e) { code = raw.toUpperCase(); }
  if (!code) { document.getElementById('homeError').textContent = '코드 또는 링크를 입력하세요'; return; }
  document.getElementById('homeError').textContent = '';
  try {
    const snap = await get(ref(db, `rooms/${code}`));
    if (!snap.exists()) { document.getElementById('homeError').textContent = '방을 찾을 수 없어요'; return; }
    roomId = code;
    roomData = snap.val();
    document.getElementById('roomTitleDisp').textContent = roomData.title;
    document.getElementById('roomSubDisp').textContent = `${roomData.start} ~ ${roomData.end}`;
    const taken = Object.values(roomData.participants || {}).map(p => p.colorIdx);
    renderColorPick2(taken);
    show('s-name');
  } catch(e) {
    document.getElementById('homeError').textContent = '연결에 실패했어요. 인터넷 연결을 확인해주세요.';
  }
};

// ─── 색상 선택 렌더링 ───
let selectedColor = 0;
function renderColorPick2(taken) {
  const avail = COLORS.map((_,i) => i).filter(i => !taken.includes(i));
  selectedColor = avail[0] ?? 0;
  const el = document.getElementById('colorPick2');
  el.innerHTML = COLORS.map((c,i) =>
    `<div class="cdot${i===selectedColor?' sel':''}${taken.includes(i)?' taken':''}" style="background:${c.bg}" id="cdot2-${i}" onclick="${taken.includes(i)?'':'window.selectColor2('+i+')'}"></div>`
  ).join('');
}
window.selectColor2 = function(i) {
  selectedColor = i;
  document.querySelectorAll('[id^=cdot2-]').forEach(el =>
    el.classList.toggle('sel', parseInt(el.id.split('-')[1]) === i)
  );

// ─── 참여하기 (이름/색상 확정) ───
window.enterRoom = async function() {
  const name = document.getElementById('myName').value.trim();
  if (!name) { document.getElementById('nameError').textContent = '이름을 입력하세요'; return; }
  document.getElementById('nameError').textContent = '';

  const btn = document.querySelector('#s-name .btn-primary');
  btn.textContent = '참여 중...';
  btn.disabled = true;

  try {
    const existing = roomData.participants && roomData.participants[name];
    const colorIdx = existing ? existing.colorIdx : selectedColor;
    if (!existing) {
      await update(ref(db, `rooms/${roomId}/participants/${name}`), {name, colorIdx, days: []});
    }
    // 방장이면 Firebase에 createdBy 저장 (아직 저장 안 된 경우에만)
    if (localStorage.getItem('room_owner_' + roomId) === '1' && !roomData.createdBy) {
      await update(ref(db, `rooms/${roomId}`), {createdBy: name});
      roomData.createdBy = name;
    }
    me = {name, colorIdx};
    localStorage.setItem("sched_" + roomId, JSON.stringify({name}));
    const [sy, sm] = roomData.start.split('-').map(Number);
    currentMonth = new Date(sy, sm - 1);
    setupRealtimeListener();
    goToCal();
  } catch(e) {
    document.getElementById('nameError').textContent = '참여에 실패했어요. 인터넷 연결을 확인해주세요.';
    btn.textContent = '참여하기';
    btn.disabled = false;
  }
};

// ─── 실시간 데이터 리스너 설정 ───
function setupRealtimeListener() {
  if (unsubscribe) unsubscribe();
  const roomRef = ref(db, `rooms/${roomId}`);
  unsubscribe = onValue(roomRef, snap => {
    if (!snap.exists()) return;
    roomData = snap.val();
    if (document.getElementById('s-cal').classList.contains('active')) {
      renderParticipantTags();
      renderCal();
    }
  });
}

// ─── 캘린더 화면으로 이동 ───
function goToCal() {
  document.getElementById('calTitle').textContent = roomData.title;
  const url = `${location.origin}${location.pathname}?room=${roomId}`;
  document.getElementById('shareUrl').value = url;
  document.getElementById('roomCodeDisp').textContent = roomId;
  if (me) {
    const c = COLORS[me.colorIdx];
    const badge = document.getElementById('myBadge');
    badge.textContent = me.name;
    badge.style.cssText = `background:${c.light};color:${c.text};border-color:${c.bg}`;
    badge.style.display = '';
    document.getElementById('joinBtnWrap').style.display = 'none';
    document.getElementById('calHint').textContent = '가능한 날짜를 클릭 또는 드래그로 표시 → 상단 링크 복사 → 친구에게 공유';
  } else {
    document.getElementById('myBadge').style.display = 'none';
    document.getElementById('joinBtnWrap').style.display = 'block';
    document.getElementById('calHint').textContent = '일정을 확인하세요. 내 일정을 추가하려면 아래 버튼을 눌러주세요.';
  }
  // 방장 여부: 현재 로그인한 이름이 Firebase에 저장된 createdBy와 일치할 때만 표시
  const isOwner = me && roomData.createdBy && roomData.createdBy === me.name;
  document.getElementById('deleteRoomBtn').style.display = isOwner ? '' : 'none';

  renderParticipantTags();
  renderCal();
  show('s-cal');
}

// ─── 참여자 목록 가져오기 ───
function getParticipants() {
  return Object.values(roomData.participants || {});
}

// ─── 내 선택 날짜 가져오기 ───
function getMyDays() {
  const p = (roomData.participants || {})[me.name];
  return p && p.days ? p.days : [];
}

// ─── 참여자 태그 렌더링 ───
function renderParticipantTags() {
  const el = document.getElementById('participantTags');
  const isOwner = me && roomData.createdBy && roomData.createdBy === me.name;
  el.innerHTML = getParticipants().map(p => {
    const c = COLORS[p.colorIdx];
    const isMe = me && p.name === me.name;
    // 내 항목: 본인 삭제 / 방장: 모든 참여자 삭제 가능
    let removeBtn = '';
    if (isMe) {
      removeBtn = `<button class="tag-remove" onclick="window.removeParticipant('${p.name}')" title="내 일정 삭제">✕</button>`;
    } else if (isOwner) {
      removeBtn = `<button class="tag-remove" onclick="window.removeParticipant('${p.name}')" title="${p.name} 일정 삭제">✕</button>`;
    }
    return `<div class="tag" style="background:${c.light};color:${c.text};border-color:${c.bg}">
      <span style="width:8px;height:8px;border-radius:50%;background:${c.bg};display:inline-block"></span>
      ${p.name}${isMe?' (나)':''}${removeBtn}
    </div>`;
  }).join('');
}

// ─── 참여자 일정 삭제 (본인 또는 방장만 가능) ───
window.removeParticipant = async function(name) {
  if (!roomId) return;
  const isMe = me && me.name === name;
  const isOwner = me && roomData.createdBy === me.name;
  if (!isMe && !isOwner) return; // 권한 없으면 차단

  const msg = isMe
    ? `내 일정을 삭제할까요? 이 작업은 되돌릴 수 없어요.`
    : `"${name}"의 일정을 삭제할까요? 이 작업은 되돌릴 수 없어요.`;
  if (!confirm(msg)) return;

  try {
    await remove(ref(db, `rooms/${roomId}/participants/${name}`));
    // 본인 삭제한 경우 me 초기화
    if (isMe) {
      localStorage.removeItem("sched_" + roomId);
      me = null;
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      const snap = await get(ref(db, `rooms/${roomId}`));
      if (snap.exists()) {
        roomData = snap.val();
        setupRealtimeListener();
        goToCal();
      } else {
        goHome();
      }
    }
  } catch(e) {
    alert('삭제에 실패했어요. 다시 시도해주세요.');
  }
};

// ─── 방 삭제 (방장만 가능) ───
window.deleteRoom = async function() {
  if (!confirm(`"${roomData.title}" 방을 삭제할까요?\n참여자 전체의 일정이 사라지고 되돌릴 수 없어요.`)) return;
  try {
    await remove(ref(db, `rooms/${roomId}`));
    localStorage.removeItem('room_owner_' + roomId);
    localStorage.removeItem('sched_' + roomId);
    window.goHome();
  } catch(e) {
    alert('삭제에 실패했어요. 다시 시도해주세요.');
  }
};

// ─── 달력 렌더링 ───
function renderCal() {
  const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('monthTitle').textContent = `${y}년 ${months[m]}`;

  const today = new Date();
  const first = new Date(y, m, 1).getDay();
  const last  = new Date(y, m+1, 0).getDate();
  const prevLast = new Date(y, m, 0).getDate();

  // 달력 셀 목록 만들기
  let cells = [];
  for (let i = 0; i < first; i++)
    cells.push({day: prevLast-first+1+i, cur: false, rm: m===0?11:m-1, ry: m===0?y-1:y});
  for (let d = 1; d <= last; d++)
    cells.push({day: d, cur: true, rm: m, ry: y});
  while (cells.length % 7 !== 0) {
    const l = cells.length - first - last + 1;
    cells.push({day: l, cur: false, rm: m===11?0:m+1, ry: m===11?y+1:y});
  }

  const myDays  = me ? getMyDays() : [];
  const parts   = getParticipants();
  const grid    = document.getElementById('calGrid');

  grid.innerHTML = cells.map(c => {
    const key     = dkey(c.ry, c.rm, c.day);
    const isToday = c.cur && today.getFullYear()===y && today.getMonth()===m && today.getDate()===c.day;
    const isMine  = me && myDays.includes(key);
    const present = parts.filter(p => p.days && p.days.includes(key));
    const total   = parts.length, count = present.length;

    // ─── 히트맵: 셀 배경색 클래스 결정 ───
    let heatClass = '';
    let heatBarColor = '';
    if (total > 0 && count > 0) {
      const r = count / total;
      if (r === 1)       { heatClass = 'heat-all';  heatBarColor = '#1D9E75'; }
      else if (r >= 0.5) { heatClass = 'heat-half'; heatBarColor = '#EF9F27'; }
      else               { heatClass = 'heat-few';  heatBarColor = '#E24B4A'; }
    }

    // 내 날짜 선택 시 보더/배경 스타일 (히트맵보다 우선)
    const myC = me ? COLORS[me.colorIdx] : null;
    const mineStyle = isMine ? `border-color:${myC.bg};border-width:2px;background:${myC.light};` : '';

    // 참여자 색상 점
    const dotHtml = present.map(p =>
      `<div class="dot" style="background:${COLORS[p.colorIdx].bg}"></div>`
    ).join('');

    // 히트맵 바 (두께 6px로 개선)
    const heatHtml = count > 0
      ? `<div class="hbar" style="background:${heatBarColor};width:${Math.round(count/Math.max(total,1)*100)}%"></div>`
      : '';

    // 마우스 이벤트 (내가 참여자일 때만)
    const evts = me
      ? `onmousedown="window.onDown('${key}',${c.cur})" onmouseover="window.onOver('${key}',${c.cur})" onmouseup="window.onUp()"`
      : '';

    return `<div class="dc${c.cur?'':' other'}${isToday?' today':''}${isMine?'':' '+heatClass}" style="${mineStyle}" data-key="${key}" ${evts}>
      <div class="dn">${c.day}</div>
      <div class="dots">${dotHtml}</div>
      ${heatHtml}
    </div>`;
  }).join('');

  renderLegend();
  updateInfo();
}

// ─── 드래그로 날짜 선택 (마우스) ───
window.onDown = function(key, isCur) {
  if (!isCur || !me) return;
  isDragging = true;
  dragMode = !getMyDays().includes(key); // true=추가, false=제거
  applyDrag(key);
};
window.onOver = function(key, isCur) {
  if (!isCur || !isDragging) return;
  applyDrag(key);
};
window.onUp = function() { isDragging = false; };
document.addEventListener('mouseup', () => { isDragging = false; });

// ─── 제목 입력창에서 엔터 키로 저장 ───
document.getElementById('titleInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') window.saveTitle();
  if (e.key === 'Escape') window.cancelEditTitle();
});

// ─── 터치 드래그 지원 (모바일) ───
// touchstart: 손가락 누를 때
document.addEventListener('touchstart', (e) => {
  const el = e.target.closest('.dc');
  if (!el) return;
  const key   = el.dataset.key;
  const isCur = !el.classList.contains('other');
  window.onDown(key, isCur);
}, { passive: true });

// touchmove: 손가락 드래그할 때 → 현재 위치의 셀 찾아서 적용
document.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const touch = e.touches[0];
  // 현재 손가락 위치에 있는 요소 찾기
  const el = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.dc');
  if (!el) return;
  const key   = el.dataset.key;
  const isCur = !el.classList.contains('other');
  window.onOver(key, isCur);
}, { passive: true });

// touchend: 손가락 뗄 때
document.addEventListener('touchend', () => {
  window.onUp();
}, { passive: true });

// ─── 드래그 큐: 여러 날짜를 한 번에 업데이트 (성능 최적화) ───
let dragQueue = new Set(), dragTimer = null;
function applyDrag(key) {
  const myDays = getMyDays();
  if (dragMode && !myDays.includes(key))  dragQueue.add('add:' + key);
  else if (!dragMode && myDays.includes(key)) dragQueue.add('remove:' + key);
  clearTimeout(dragTimer);
  dragTimer = setTimeout(flushDrag, 300); // 300ms 후 일괄 저장

  // 화면에는 즉시 반영 (낙관적 업데이트)
  const myDaysCopy = [...myDays];
  dragQueue.forEach(q => {
    const [op, k] = q.split(':');
    if (op==='add' && !myDaysCopy.includes(k)) myDaysCopy.push(k);
    else if (op==='remove') { const i = myDaysCopy.indexOf(k); if (i>=0) myDaysCopy.splice(i,1); }
  });
  if (roomData.participants && roomData.participants[me.name])
    roomData.participants[me.name].days = myDaysCopy;
  renderCal();
}

// ─── Firebase에 변경사항 저장 ───
async function flushDrag() {
  if (!dragQueue.size) return;
  const myDays = [...getMyDays()];
  dragQueue.forEach(q => {
    const [op, k] = q.split(':');
    if (op==='add' && !myDays.includes(k)) myDays.push(k);
    else if (op==='remove') { const i = myDays.indexOf(k); if (i>=0) myDays.splice(i,1); }
  });
  dragQueue.clear();
  await update(ref(db, `rooms/${roomId}/participants/${me.name}`), {days: myDays});
}

// ─── 겹치는 날짜 범례 렌더링 ───
function renderLegend() {
  const legend = document.getElementById('legend');
  const items  = document.getElementById('legendItems');
  const parts  = getParticipants();
  if (parts.length < 2) { legend.style.display = 'none'; return; }

  const overlap = {};
  const allDays = new Set(parts.flatMap(p => p.days || []));
  allDays.forEach(key => {
    const present = parts.filter(p => p.days && p.days.includes(key));
    if (present.length >= 2) {
      const label = present.map(p => p.name).join(', ');
      if (!overlap[label]) overlap[label] = [];
      const [,mm,dd] = key.split('-');
      overlap[label].push(`${parseInt(mm)}/${parseInt(dd)}`);
    }
  });

  if (!Object.keys(overlap).length) { legend.style.display = 'none'; return; }
  legend.style.display = 'block';
  items.innerHTML = Object.entries(overlap).map(([label, days]) =>
    `<div class="li-row"><span class="li-names">${label}</span>: ${
      days.sort((a,b) => {
        const [am,ad] = a.split('/'); const [bm,bd] = b.split('/');
        return (parseInt(am)*100+parseInt(ad)) - (parseInt(bm)*100+parseInt(bd));
      }).join(', ')
    }</div>`
  ).join('');
}

// ─── 상단 정보 바 업데이트 ───
function updateInfo() {
  const bar   = document.getElementById('infoBar');
  const parts = getParticipants();
  if (parts.length < 2) {
    bar.textContent = '링크 공유하면 친구 일정이 실시간으로 나타나요.';
    bar.className = 'info-bar';
    return;
  }
  const allDays = new Set(parts.flatMap(p => p.days || []));
  const both = [...allDays].filter(k => parts.every(p => p.days && p.days.includes(k)));
  if (both.length) {
    bar.textContent = `✓ 모두 가능: ${both.sort().map(k => {
      const [,mm,dd] = k.split('-');
      return `${parseInt(mm)}/${parseInt(dd)}`;
    }).join(', ')}`;
    bar.className = 'info-bar good';
  } else {
    bar.textContent = '아직 모두 겹치는 날짜가 없어요.';
    bar.className = 'info-bar';
  }
}

// ─── 링크 복사 (상단 버튼 + 하단 버튼 공용) ───
window.copyUrl = function() {
  const url = document.getElementById('shareUrl').value;
  navigator.clipboard.writeText(url)
    .then(() => showCopied())
    .catch(() => {
      document.getElementById('shareUrl').select();
      document.execCommand('copy');
      showCopied();
    });
};

// 복사 완료 메시지 표시 (상단 + 하단 모두)
function showCopied() {
  // 하단 메시지
  const m = document.getElementById('copiedMsg');
  m.classList.add('show');
  setTimeout(() => m.classList.remove('show'), 2500);
  // 상단 메시지
  const top = document.getElementById('copiedMsgTop');
  top.style.opacity = '1';
  setTimeout(() => { top.style.opacity = '0'; }, 2500);
}

// ─── URL에 방 코드가 있으면 자동으로 입장 ───
(async () => {
  try {
    const code = new URLSearchParams(location.search).get('room');
    if (!code) return;
    document.getElementById('joinCode').value = code;
    await window.joinRoom();
    // 이전에 방문한 적 있으면 이름 자동 복원
    const saved = localStorage.getItem('sched_' + code);
    if (saved) {
      const {name} = JSON.parse(saved);
      const snap = await get(ref(db, `rooms/${code}/participants/${name}`));
      if (snap.exists()) {
        const p = snap.val();
        me = {name, colorIdx: p.colorIdx};
        goToCal();
      }
    }
  } catch(e) {}
})();
</script>
